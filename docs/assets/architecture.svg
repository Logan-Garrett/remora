<svg xmlns="http://www.w3.org/2000/svg" width="850" height="400" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#89b4fa"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1"/>
    </marker>
  </defs>
  <rect width="850" height="400" rx="12" fill="url(#abg)"/>

  <!-- Neovim clients -->
  <rect x="30" y="40" width="140" height="70" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="100" y="70" fill="#89b4fa" text-anchor="middle" font-weight="600">Neovim</text>
  <text x="100" y="88" fill="#6c7086" text-anchor="middle" font-size="11">(alice)</text>

  <rect x="30" y="140" width="140" height="70" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="100" y="170" fill="#89b4fa" text-anchor="middle" font-weight="600">Neovim</text>
  <text x="100" y="188" fill="#6c7086" text-anchor="middle" font-size="11">(bob)</text>

  <rect x="30" y="240" width="140" height="70" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="100" y="270" fill="#89b4fa" text-anchor="middle" font-weight="600">Neovim</text>
  <text x="100" y="288" fill="#6c7086" text-anchor="middle" font-size="11">(charlie)</text>

  <!-- Bridge arrows -->
  <line x1="170" y1="75" x2="230" y2="75" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="175" x2="230" y2="175" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="275" x2="230" y2="275" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bridge boxes -->
  <rect x="233" y="55" width="80" height="40" rx="6" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="273" y="79" fill="#cdd6f4" text-anchor="middle" font-size="10">bridge</text>

  <rect x="233" y="155" width="80" height="40" rx="6" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="273" y="179" fill="#cdd6f4" text-anchor="middle" font-size="10">bridge</text>

  <rect x="233" y="255" width="80" height="40" rx="6" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="273" y="279" fill="#cdd6f4" text-anchor="middle" font-size="10">bridge</text>

  <!-- WS arrows to server -->
  <line x1="313" y1="75" x2="390" y2="165" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="313" y1="175" x2="390" y2="175" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="313" y1="275" x2="390" y2="185" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- WS label -->
  <text x="355" y="130" fill="#585b70" font-size="10" transform="rotate(-25,355,130)">WebSocket</text>

  <!-- Server -->
  <rect x="393" y="110" width="160" height="130" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="473" y="140" fill="#f9e2af" text-anchor="middle" font-weight="700">Remora Server</text>
  <text x="473" y="160" fill="#6c7086" text-anchor="middle" font-size="11">Rust / axum</text>
  <line x1="410" y1="170" x2="536" y2="170" stroke="#45475a" stroke-width="1"/>
  <text x="473" y="190" fill="#cdd6f4" text-anchor="middle" font-size="11">REST + WebSocket</text>
  <text x="473" y="208" fill="#cdd6f4" text-anchor="middle" font-size="11">Event dispatch</text>
  <text x="473" y="226" fill="#cdd6f4" text-anchor="middle" font-size="11">Auth</text>

  <!-- Server to Postgres -->
  <line x1="473" y1="240" x2="473" y2="300" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Postgres -->
  <rect x="393" y="303" width="160" height="70" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="473" y="333" fill="#a6e3a1" text-anchor="middle" font-weight="700">Postgres</text>
  <text x="473" y="353" fill="#6c7086" text-anchor="middle" font-size="11">Events / Sessions</text>
  <text x="473" y="368" fill="#6c7086" text-anchor="middle" font-size="11">LISTEN/NOTIFY</text>

  <!-- Server to Claude -->
  <line x1="553" y1="175" x2="640" y2="175" stroke="#f5c2e7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="596" y="167" fill="#585b70" font-size="10">stdio</text>

  <!-- Claude CLI -->
  <rect x="643" y="130" width="170" height="90" rx="10" fill="#313244" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="728" y="160" fill="#f5c2e7" text-anchor="middle" font-weight="700">Claude CLI</text>
  <text x="728" y="180" fill="#6c7086" text-anchor="middle" font-size="11">--skip-permissions</text>
  <text x="728" y="198" fill="#6c7086" text-anchor="middle" font-size="11">stream-json output</text>

  <!-- Server to workspace -->
  <line x1="553" y1="130" x2="640" y2="75" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Workspace -->
  <rect x="643" y="40" width="170" height="60" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="728" y="65" fill="#f9e2af" text-anchor="middle" font-weight="600">Workspace</text>
  <text x="728" y="83" fill="#6c7086" text-anchor="middle" font-size="11">repo-a/ repo-b/ ...</text>
</svg>
