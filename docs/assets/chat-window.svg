<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" font-family="JetBrains Mono, Menlo, monospace" font-size="12">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>
  <!-- Terminal background -->
  <rect width="900" height="600" rx="10" fill="url(#bg2)"/>
  <!-- Title bar -->
  <rect width="900" height="32" rx="10" fill="#313244"/>
  <rect y="20" width="900" height="12" fill="#313244"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="38" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="56" cy="16" r="6" fill="#a6e3a1"/>
  <text x="450" y="20" fill="#cdd6f4" text-anchor="middle" font-size="12">nvim - Remora</text>

  <!-- Log window border -->
  <rect x="60" y="48" width="780" height="430" rx="8" fill="#1e1e2e" stroke="#585b70" stroke-width="1"/>
  <!-- Log title -->
  <rect x="370" y="42" width="80" height="12" fill="#1e1e2e"/>
  <text x="380" y="52" fill="#cdd6f4" font-size="11"> Remora </text>

  <!-- Event log content -->
  <text x="78" y="72" fill="#5c6370" font-size="11">[14:22:05]</text>
  <text x="170" y="72" fill="#666666" font-style="italic" font-size="11">* alice joined</text>

  <text x="78" y="92" fill="#5c6370" font-size="11">[14:22:08]</text>
  <text x="170" y="92" fill="#61afef" font-weight="bold" font-size="11">alice:</text>
  <text x="220" y="92" fill="#cdd6f4" font-size="11">let's fix the auth bug in the login flow</text>

  <text x="78" y="112" fill="#5c6370" font-size="11">[14:22:15]</text>
  <text x="170" y="112" fill="#666666" font-style="italic" font-size="11">* bob joined</text>

  <text x="78" y="132" fill="#5c6370" font-size="11">[14:22:18]</text>
  <text x="170" y="132" fill="#61afef" font-weight="bold" font-size="11">bob:</text>
  <text x="210" y="132" fill="#cdd6f4" font-size="11">I think the session token validation is wrong</text>

  <text x="78" y="152" fill="#5c6370" font-size="11">[14:22:30]</text>
  <text x="170" y="152" fill="#61afef" font-weight="bold" font-size="11">alice:</text>
  <text x="220" y="152" fill="#cdd6f4" font-size="11">/add api/src/auth.ts</text>

  <text x="78" y="172" fill="#5c6370" font-size="11">[14:22:31]</text>
  <text x="170" y="172" fill="#cdd6f4" font-size="11">&#x1f4ce; alice added api/src/auth.ts (142 lines)</text>

  <text x="78" y="202" fill="#5c6370" font-size="11">[14:22:35]</text>
  <text x="170" y="202" fill="#98c379" font-size="11">&#9654; Claude run started</text>

  <text x="78" y="222" fill="#5c6370" font-size="11">[14:22:38]</text>
  <text x="170" y="222" fill="#e5c07b" font-size="11">&#x1f527; Claude called Bash(grep -n "validateToken" api/src/auth.ts)</text>

  <text x="78" y="242" fill="#5c6370" font-size="11">[14:22:39]</text>
  <text x="170" y="242" fill="#e5c07b" font-size="11">&#8592; tool result (3 lines)</text>

  <text x="78" y="262" fill="#5c6370" font-size="11">[14:22:42]</text>
  <text x="170" y="262" fill="#e5c07b" font-size="11">&#x1f527; Claude called Edit(api/src/auth.ts)</text>

  <text x="78" y="282" fill="#5c6370" font-size="11">[14:22:43]</text>
  <text x="170" y="282" fill="#e5c07b" font-size="11">&#8592; tool result (1 lines)</text>

  <text x="78" y="312" fill="#5c6370" font-size="11">[14:22:45]</text>
  <text x="170" y="312" fill="#98c379" font-size="11">Claude: Found the bug. The validateToken function was</text>
  <text x="170" y="332" fill="#98c379" font-size="11">comparing against the raw token instead of the hashed</text>
  <text x="170" y="352" fill="#98c379" font-size="11">version. Fixed by adding bcrypt.compare() on line 47.</text>

  <text x="78" y="382" fill="#5c6370" font-size="11">[14:22:46]</text>
  <text x="170" y="382" fill="#666666" font-style="italic" font-size="11">* Claude run completed.</text>

  <text x="78" y="412" fill="#5c6370" font-size="11">[14:22:50]</text>
  <text x="170" y="412" fill="#61afef" font-weight="bold" font-size="11">bob:</text>
  <text x="210" y="412" fill="#cdd6f4" font-size="11">nice, let me check the diff</text>

  <text x="78" y="432" fill="#5c6370" font-size="11">[14:22:52]</text>
  <text x="170" y="432" fill="#cdd6f4" font-size="11">&#x1f4ca; diff output</text>
  <text x="170" y="452" fill="#a6e3a1" font-size="11">+  const match = await bcrypt.compare(token, stored.hash);</text>
  <text x="170" y="467" fill="#f38ba8" font-size="11">-  const match = token === stored.raw;</text>

  <!-- Prompt window -->
  <rect x="60" y="492" width="780" height="70" rx="8" fill="#1e1e2e" stroke="#585b70" stroke-width="1"/>
  <rect x="68" y="487" width="20" height="12" fill="#1e1e2e"/>
  <text x="71" y="497" fill="#cdd6f4" font-size="11"> > </text>

  <text x="78" y="520" fill="#cdd6f4" font-size="11">looks good, can you also add a test for it?&#x258C;</text>

  <!-- Status line hint -->
  <text x="78" y="580" fill="#585b70" font-size="10">&#x1f4a1; /help for commands  |  &lt;Esc&gt; close  |  &lt;CR&gt; send  |  &lt;S-CR&gt; newline</text>
</svg>
