name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  # ── Build server + bridge binaries ─────────────────────────────────────────
  build-rust:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            server_name: remora-server-linux-amd64
            bridge_name: remora-bridge-linux-amd64
            use_zigbuild: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            server_name: remora-server-linux-arm64
            bridge_name: remora-bridge-linux-arm64
            use_zigbuild: true

          - os: macos-latest
            target: aarch64-apple-darwin
            server_name: remora-server-macos-arm64
            bridge_name: remora-bridge-macos-arm64
            use_zigbuild: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-zigbuild (ARM cross-compile)
        if: matrix.use_zigbuild
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Build (native)
        if: "!matrix.use_zigbuild"
        run: |
          cargo build --release --target ${{ matrix.target }} -p remora-server -p remora-bridge

      - name: Build (zigbuild cross)
        if: matrix.use_zigbuild
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} -p remora-server -p remora-bridge

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/remora-server dist/${{ matrix.server_name }}
          cp target/${{ matrix.target }}/release/remora-bridge dist/${{ matrix.bridge_name }}
          cd dist
          sha256sum ${{ matrix.server_name }} > ${{ matrix.server_name }}.sha256
          sha256sum ${{ matrix.bridge_name }} > ${{ matrix.bridge_name }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          retention-days: 1

  # ── Build web client ─────────────────────────────────────────────────────────
  build-web:
    name: Build web client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Package
        run: |
          tar -czf remora-web.tar.gz -C web/dist .
          sha256sum remora-web.tar.gz > remora-web.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-client
          path: |
            remora-web.tar.gz
            remora-web.tar.gz.sha256
          retention-days: 1

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [build-rust, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a file to avoid quoting issues
          echo "$NOTES" > release_notes.md
          echo "Try the hosted web client: https://remora.configurationproxy.com" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release_notes.md
          files: artifacts/*
          fail_on_unmatched_files: false

  # ── Publish Docker image to GHCR ────────────────────────────────────────────
  docker:
    name: Publish Docker image
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag and lowercase repo
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.repo }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.version.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
