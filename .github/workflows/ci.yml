name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  typos:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: crate-ci/typos@3bcd3b343e2ffaa3d23f8cfe7f78d0f8c2d0d0c6 # master

  rust-check:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --all-targets
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  test-postgres:
    name: Test (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: remora_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: remora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://remora_test:test@localhost/remora_test
      REMORA_DB_PROVIDER: postgres
      REMORA_TEAM_TOKEN: test-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Create uuid-ossp extension
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
      - name: Run unit tests
        run: cargo test --all
      - name: Run integration tests
        run: cargo test --all -- --ignored --test-threads=1

  test-sqlite:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:remora_test.db"
      REMORA_DB_PROVIDER: sqlite
      REMORA_TEAM_TOKEN: test-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run unit tests
        run: cargo test --all
      - name: Run integration tests
        run: cargo test --all -- --ignored --test-threads=1

  test-mssql:
    name: Test (MSSQL)
    runs-on: ubuntu-latest
    continue-on-error: true  # MSSQL backend is experimental
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "Remora_Test_123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Remora_Test_123!' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Remora_Test_123!' -Q 'SELECT 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    env:
      DATABASE_URL: "server=localhost;database=remora_test;user=sa;password=Remora_Test_123!;TrustServerCertificate=true;encrypt=false"
      REMORA_DB_PROVIDER: mssql
      REMORA_TEAM_TOKEN: test-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install sqlcmd
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
          sudo add-apt-repository "$(wget -qO- https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list)" || true
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev || sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev || true
      - name: Wait for MSSQL and create test database
        run: |
          SQLCMD=""
          if [ -f /opt/mssql-tools18/bin/sqlcmd ]; then
            SQLCMD="/opt/mssql-tools18/bin/sqlcmd -C"
          elif [ -f /opt/mssql-tools/bin/sqlcmd ]; then
            SQLCMD="/opt/mssql-tools/bin/sqlcmd"
          else
            echo "sqlcmd not found, skipping DB creation"
            exit 0
          fi
          echo "Using: $SQLCMD"
          for i in $(seq 1 30); do
            $SQLCMD -S localhost -U sa -P 'Remora_Test_123!' -Q "SELECT 1" > /dev/null 2>&1 && echo "MSSQL ready" && break
            echo "Waiting for MSSQL... ($i)"
            sleep 3
          done
          $SQLCMD -S localhost -U sa -P 'Remora_Test_123!' -Q "CREATE DATABASE remora_test" || true
          echo "Database created"
      - name: Build with MSSQL support
        run: cargo build -p remora-server --features mssql
      - name: Run integration tests
        run: cargo test -p remora-server --features mssql -- --ignored --test-threads=1

  neovim-test:
    name: Neovim plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1
        with:
          neovim: true
          version: stable
      - name: Run Neovim tests
        run: |
          chmod +x plugin/tests/run_tests.sh
          plugin/tests/run_tests.sh

  sandbox-e2e:
    name: Sandbox E2E (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build sandbox image
        run: docker build -t remora-sandbox -f Dockerfile.sandbox .
      - name: Test container lifecycle
        run: |
          set -e

          # Create workspace
          mkdir -p /tmp/remora-e2e/workspace
          echo "test file" > /tmp/remora-e2e/workspace/hello.txt

          # Create container with fake API key (no real Claude calls)
          docker create \
            --name remora-e2e-test \
            --cpus 2 --memory 2g --pids-limit 512 \
            -v /tmp/remora-e2e/workspace:/workspace \
            -e "ANTHROPIC_API_KEY=sk-ant-fake-key-for-ci-testing" \
            -w /workspace \
            remora-sandbox
          echo "PASS: Container created"

          # Start container
          docker start remora-e2e-test
          echo "PASS: Container started"

          # Verify Claude CLI is installed
          docker exec remora-e2e-test claude --version
          echo "PASS: Claude CLI available"

          # Verify workspace is mounted
          CONTENT=$(docker exec remora-e2e-test cat /workspace/hello.txt)
          [ "$CONTENT" = "test file" ] && echo "PASS: Workspace mounted" || (echo "FAIL: Workspace not mounted" && exit 1)

          # Verify Claude picks up the API key and returns stream-json
          OUTPUT=$(docker exec remora-e2e-test claude \
            --dangerously-skip-permissions \
            -p "hello" \
            --output-format stream-json \
            --verbose \
            --max-turns 1 2>&1 || true)
          echo "$OUTPUT" | grep -q '"apiKeySource":"ANTHROPIC_API_KEY"' && echo "PASS: API key detected" || (echo "FAIL: API key not detected" && exit 1)
          echo "$OUTPUT" | grep -q '"type":"result"' && echo "PASS: stream-json result received" || (echo "FAIL: No result in output" && exit 1)

          # Verify non-root user
          WHOAMI=$(docker exec remora-e2e-test whoami)
          [ "$WHOAMI" = "remora" ] && echo "PASS: Running as non-root (remora)" || (echo "FAIL: Running as $WHOAMI" && exit 1)

          # Cleanup
          docker rm -f remora-e2e-test
          echo "PASS: Container destroyed"
          echo ""
          echo "All sandbox E2E tests passed."

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  web-audit:
    name: Web dependency audit & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: npm audit (no high/critical)
        working-directory: web
        run: npm audit --audit-level=high
      - name: TypeScript type-check (web)
        working-directory: web
        run: npx tsc --noEmit
      - name: Install MCP dependencies
        working-directory: mcp
        run: npm ci
      - name: TypeScript type-check (MCP server)
        working-directory: mcp
        run: npx tsc --noEmit
      - name: npm audit (MCP)
        working-directory: mcp
        run: npm audit --audit-level=high

  e2e-web:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:e2e_test.db
      REMORA_DB_PROVIDER: sqlite
      REMORA_TEAM_TOKEN: e2e-test-token
      REMORA_BIND: 127.0.0.1:7200
      REMORA_SKIP_PERMISSIONS: "true"
      REMORA_CLAUDE_CMD: echo
      REMORA_WORKSPACE_DIR: /tmp/remora-e2e-workspaces
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build remora-server
        run: cargo build -p remora-server

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium webkit

      - name: Start remora-server
        run: |
          ./target/debug/remora-server &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait until /health responds
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:7200/health && echo "Server ready" && break
            echo "Waiting for server... ($i)"
            sleep 1
          done

      - name: Start Vite dev server
        working-directory: web
        run: |
          npx vite --port 3333 &
          echo "VITE_PID=$!" >> "$GITHUB_ENV"
          # Wait until Vite is ready
          for i in $(seq 1 20); do
            curl -sf http://localhost:3333 && echo "Vite ready" && break
            echo "Waiting for Vite... ($i)"
            sleep 1
          done
        env:
          VITE_BASE_URL: http://localhost:3333

      - name: Run Playwright tests
        working-directory: web
        run: npm run test:e2e
        env:
          VITE_BASE_URL: http://localhost:3333
          REMORA_SERVER_URL: http://127.0.0.1:7200
          REMORA_TEAM_TOKEN: e2e-test-token

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  test-windows:
    name: Test (Windows — SQLite + MSSQL + Web)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # ── Rust lint & format ──────────────────────────────────────────────
      - name: Rust lint & format
        run: |
          cargo check --all-targets
          cargo clippy -- -D warnings
          cargo fmt --check

      # ── SQLite tests ────────────────────────────────────────────────────
      - name: Run tests (SQLite)
        env:
          DATABASE_URL: "sqlite:remora_test.db"
          REMORA_DB_PROVIDER: sqlite
          REMORA_TEAM_TOKEN: test-token
        run: |
          cargo test --all
          cargo test --all -- --ignored --test-threads=1

      # ── MSSQL setup ────────────────────────────────────────────────────
      - name: Install SQL Server 2022 Express
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "Installing SQL Server 2022 Express via Chocolatey..."
          choco install sql-server-express -y --no-progress
          Write-Host "Installation complete"

      - name: Configure SQL Server
        continue-on-error: true
        shell: pwsh
        run: |
          # Start the SQL Server service
          Write-Host "Starting SQL Server..."
          net start MSSQLSERVER 2>$null
          if ($LASTEXITCODE -ne 0) {
            # Try SQLEXPRESS if default instance not found
            net start "MSSQL`$SQLEXPRESS" 2>$null
          }

          # Find the correct registry path for this SQL Server version
          $sqlRegBase = "HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server"
          $instances = Get-ChildItem "$sqlRegBase" -ErrorAction SilentlyContinue |
            Where-Object { $_.PSChildName -match 'MSSQL\d+\.' }
          foreach ($inst in $instances) {
            $mssqlPath = "$($inst.PSPath)\MSSQLServer"
            if (Test-Path $mssqlPath) {
              Write-Host "Enabling mixed mode auth at: $mssqlPath"
              Set-ItemProperty -Path $mssqlPath -Name "LoginMode" -Value 2

              # Enable TCP/IP
              $tcpPath = "$($inst.PSPath)\MSSQLServer\SuperSocketNetLib\Tcp"
              if (Test-Path $tcpPath) {
                Set-ItemProperty -Path $tcpPath -Name "Enabled" -Value 1
                Write-Host "TCP/IP enabled at: $tcpPath"

                # Set port 1433 on IPAll
                $ipAllPath = "$tcpPath\IPAll"
                if (Test-Path $ipAllPath) {
                  Set-ItemProperty -Path $ipAllPath -Name "TcpPort" -Value "1433"
                  Set-ItemProperty -Path $ipAllPath -Name "TcpDynamicPorts" -Value ""
                  Write-Host "Port 1433 set on IPAll"
                }
              }
            }
          }

          # Restart SQL Server to apply changes
          Write-Host "Restarting SQL Server..."
          net stop MSSQLSERVER 2>$null; net start MSSQLSERVER 2>$null
          net stop "MSSQL`$SQLEXPRESS" 2>$null; net start "MSSQL`$SQLEXPRESS" 2>$null
          Start-Sleep -Seconds 5

          # Enable SA login and set password
          Write-Host "Configuring SA login..."
          sqlcmd -S localhost -E -Q "ALTER LOGIN [sa] WITH PASSWORD=N'Remora_Test_123!', CHECK_POLICY=OFF; ALTER LOGIN [sa] ENABLE;"

          # Create test database
          sqlcmd -S localhost -U sa -P "Remora_Test_123!" -Q "CREATE DATABASE remora_test;"
          Write-Host "Database ready"

          # Verify connection
          sqlcmd -S localhost -U sa -P "Remora_Test_123!" -d remora_test -Q "SELECT 1 AS connected;"

      - name: Build with MSSQL support
        continue-on-error: true
        run: cargo build -p remora-server --features mssql

      - name: Run tests (MSSQL)
        continue-on-error: true
        env:
          DATABASE_URL: "server=localhost;database=remora_test;user=sa;password=Remora_Test_123!;TrustServerCertificate=true;encrypt=false"
          REMORA_DB_PROVIDER: mssql
          REMORA_TEAM_TOKEN: test-token
        run: cargo test -p remora-server --features mssql -- --ignored --test-threads=1

      # ── Web client ──────────────────────────────────────────────────────
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Web client — install, type-check, build, audit
        working-directory: web
        run: |
          npm ci
          npx tsc --noEmit
          npm run build
          npm audit --audit-level=high

      # ── E2E: live Playwright tests against MSSQL backend ────────────
      - name: Install Playwright (chromium only)
        continue-on-error: true
        working-directory: web
        run: npx playwright install chromium

      - name: Create E2E database (MSSQL)
        continue-on-error: true
        shell: pwsh
        run: |
          sqlcmd -S localhost -U sa -P "Remora_Test_123!" -Q "CREATE DATABASE remora_e2e;" 2>$null
          Write-Host "E2E database created"

      - name: Start server (MSSQL backend)
        continue-on-error: true
        shell: pwsh
        env:
          DATABASE_URL: "server=localhost;database=remora_e2e;user=sa;password=Remora_Test_123!;TrustServerCertificate=true;encrypt=false"
          REMORA_DB_PROVIDER: mssql
          REMORA_TEAM_TOKEN: e2e-test-token
          REMORA_BIND: "127.0.0.1:7200"
          REMORA_SKIP_PERMISSIONS: "true"
          REMORA_CLAUDE_CMD: "echo"
        run: |
          $env:REMORA_WORKSPACE_DIR = "$env:TEMP\remora-e2e"
          New-Item -ItemType Directory -Path $env:REMORA_WORKSPACE_DIR -Force | Out-Null

          # Start server in background
          Start-Process -FilePath ".\target\debug\remora-server.exe" `
            -ArgumentList @() `
            -RedirectStandardOutput "server-stdout.log" `
            -RedirectStandardError "server-stderr.log" `
            -PassThru | Out-Null

          # Wait for health endpoint
          for ($i = 1; $i -le 30; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:7200/health" -UseBasicParsing -ErrorAction Stop
              if ($r.StatusCode -eq 200) { Write-Host "Server ready"; break }
            } catch {
              Write-Host "Waiting for server... ($i/30)"
              Start-Sleep -Seconds 2
            }
            if ($i -eq 30) {
              Write-Host "Server failed to start. Logs:"
              Get-Content server-stdout.log -ErrorAction SilentlyContinue
              Get-Content server-stderr.log -ErrorAction SilentlyContinue
              throw "Server did not become healthy in 60s"
            }
          }

      - name: Start Vite dev server
        continue-on-error: true
        shell: pwsh
        working-directory: web
        run: |
          Start-Process -FilePath "npx.cmd" -ArgumentList "vite","--port","3333" `
            -RedirectStandardOutput "vite-stdout.log" `
            -RedirectStandardError "vite-stderr.log" `
            -PassThru | Out-Null

          for ($i = 1; $i -le 20; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:3333" -UseBasicParsing -ErrorAction Stop
              if ($r.StatusCode -eq 200) { Write-Host "Vite ready"; break }
            } catch {
              Write-Host "Waiting for Vite... ($i/20)"
              Start-Sleep -Seconds 2
            }
          }

      - name: Run Playwright E2E (MSSQL backend)
        continue-on-error: true
        working-directory: web
        env:
          VITE_BASE_URL: http://localhost:3333
          REMORA_SERVER_URL: http://127.0.0.1:7200
          REMORA_TEAM_TOKEN: e2e-test-token
        run: npx playwright test --project=chromium

      - name: Upload Playwright report (Windows)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-windows
          path: web/playwright-report/
          retention-days: 7

      - name: Dump server logs on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== Server stdout ==="
          Get-Content server-stdout.log -ErrorAction SilentlyContinue
          Write-Host "=== Server stderr ==="
          Get-Content server-stderr.log -ErrorAction SilentlyContinue

  docker-compose-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Run compose smoke test
        run: bash scripts/compose-test.sh

      - name: Dump server logs on failure
        if: failure()
        run: docker compose logs server || true

  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:coverage_test.db"
      REMORA_DB_PROVIDER: sqlite
      REMORA_TEAM_TOKEN: test-token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@dbd64b376a77edb5c67164dc7b5383735171cf97 # cargo-llvm-cov
      - name: Generate coverage (LCOV)
        run: cargo llvm-cov --all --lcov --output-path lcov.info -- --include-ignored --test-threads=1
      - name: Upload to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  build:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --release
