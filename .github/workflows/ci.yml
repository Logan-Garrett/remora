name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  test-postgres:
    name: Test (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: remora_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: remora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://remora_test:test@localhost/remora_test
      REMORA_DB_PROVIDER: postgres
      REMORA_TEAM_TOKEN: test-token
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create uuid-ossp extension
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
      - name: Run unit tests
        run: cargo test --all
      - name: Run integration tests
        run: cargo test --all -- --ignored --test-threads=1

  test-sqlite:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:remora_test.db"
      REMORA_DB_PROVIDER: sqlite
      REMORA_TEAM_TOKEN: test-token
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --all
      - name: Run integration tests
        run: cargo test --all -- --ignored --test-threads=1

  test-mssql:
    name: Test (MSSQL)
    runs-on: ubuntu-latest
    continue-on-error: true  # MSSQL backend is experimental
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: "Remora_Test_123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Remora_Test_123!' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Remora_Test_123!' -Q 'SELECT 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    env:
      DATABASE_URL: "server=localhost;database=remora_test;user=sa;password=Remora_Test_123!;TrustServerCertificate=true;encrypt=false"
      REMORA_DB_PROVIDER: mssql
      REMORA_TEAM_TOKEN: test-token
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlcmd
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
          sudo add-apt-repository "$(wget -qO- https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list)" || true
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev || sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev || true
      - name: Wait for MSSQL and create test database
        run: |
          SQLCMD=""
          if [ -f /opt/mssql-tools18/bin/sqlcmd ]; then
            SQLCMD="/opt/mssql-tools18/bin/sqlcmd -C"
          elif [ -f /opt/mssql-tools/bin/sqlcmd ]; then
            SQLCMD="/opt/mssql-tools/bin/sqlcmd"
          else
            echo "sqlcmd not found, skipping DB creation"
            exit 0
          fi
          echo "Using: $SQLCMD"
          for i in $(seq 1 30); do
            $SQLCMD -S localhost -U sa -P 'Remora_Test_123!' -Q "SELECT 1" > /dev/null 2>&1 && echo "MSSQL ready" && break
            echo "Waiting for MSSQL... ($i)"
            sleep 3
          done
          $SQLCMD -S localhost -U sa -P 'Remora_Test_123!' -Q "CREATE DATABASE remora_test" || true
          echo "Database created"
      - name: Build with MSSQL support
        run: cargo build -p remora-server --features mssql
      - name: Run integration tests
        run: cargo test -p remora-server --features mssql -- --ignored --test-threads=1

  neovim-test:
    name: Neovim plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Run Neovim tests
        run: |
          chmod +x plugin/tests/run_tests.sh
          plugin/tests/run_tests.sh

  sandbox-e2e:
    name: Sandbox E2E (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sandbox image
        run: docker build -t remora-sandbox -f Dockerfile.sandbox .
      - name: Test container lifecycle
        run: |
          set -e

          # Create workspace
          mkdir -p /tmp/remora-e2e/workspace
          echo "test file" > /tmp/remora-e2e/workspace/hello.txt

          # Create container with fake API key (no real Claude calls)
          docker create \
            --name remora-e2e-test \
            --cpus 2 --memory 2g --pids-limit 512 \
            -v /tmp/remora-e2e/workspace:/workspace \
            -e "ANTHROPIC_API_KEY=sk-ant-fake-key-for-ci-testing" \
            -w /workspace \
            remora-sandbox
          echo "PASS: Container created"

          # Start container
          docker start remora-e2e-test
          echo "PASS: Container started"

          # Verify Claude CLI is installed
          docker exec remora-e2e-test claude --version
          echo "PASS: Claude CLI available"

          # Verify workspace is mounted
          CONTENT=$(docker exec remora-e2e-test cat /workspace/hello.txt)
          [ "$CONTENT" = "test file" ] && echo "PASS: Workspace mounted" || (echo "FAIL: Workspace not mounted" && exit 1)

          # Verify Claude picks up the API key and returns stream-json
          OUTPUT=$(docker exec remora-e2e-test claude \
            --dangerously-skip-permissions \
            -p "hello" \
            --output-format stream-json \
            --verbose \
            --max-turns 1 2>&1 || true)
          echo "$OUTPUT" | grep -q '"apiKeySource":"ANTHROPIC_API_KEY"' && echo "PASS: API key detected" || (echo "FAIL: API key not detected" && exit 1)
          echo "$OUTPUT" | grep -q '"type":"result"' && echo "PASS: stream-json result received" || (echo "FAIL: No result in output" && exit 1)

          # Verify non-root user
          WHOAMI=$(docker exec remora-e2e-test whoami)
          [ "$WHOAMI" = "remora" ] && echo "PASS: Running as non-root (remora)" || (echo "FAIL: Running as $WHOAMI" && exit 1)

          # Cleanup
          docker rm -f remora-e2e-test
          echo "PASS: Container destroyed"
          echo ""
          echo "All sandbox E2E tests passed."

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  web-audit:
    name: Web dependency audit & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: npm audit (no high/critical)
        working-directory: web
        run: npm audit --audit-level=high
      - name: TypeScript type-check
        working-directory: web
        run: npx tsc --noEmit

  e2e-web:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:e2e_test.db
      REMORA_DB_PROVIDER: sqlite
      REMORA_TEAM_TOKEN: e2e-test-token
      REMORA_BIND: 127.0.0.1:7200
      REMORA_SKIP_PERMISSIONS: "true"
      REMORA_CLAUDE_CMD: echo
      REMORA_WORKSPACE_DIR: /tmp/remora-e2e-workspaces
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build remora-server
        run: cargo build -p remora-server

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium webkit

      - name: Start remora-server
        run: |
          ./target/debug/remora-server &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait until /health responds
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:7200/health && echo "Server ready" && break
            echo "Waiting for server... ($i)"
            sleep 1
          done

      - name: Start Vite dev server
        working-directory: web
        run: |
          npx vite --port 3333 &
          echo "VITE_PID=$!" >> "$GITHUB_ENV"
          # Wait until Vite is ready
          for i in $(seq 1 20); do
            curl -sf http://localhost:3333 && echo "Vite ready" && break
            echo "Waiting for Vite... ($i)"
            sleep 1
          done
        env:
          VITE_BASE_URL: http://localhost:3333

      - name: Run Playwright tests
        working-directory: web
        run: npm run test:e2e
        env:
          VITE_BASE_URL: http://localhost:3333
          REMORA_SERVER_URL: http://127.0.0.1:7200
          REMORA_TEAM_TOKEN: e2e-test-token

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  docker-compose-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run compose smoke test
        run: bash scripts/compose-test.sh

      - name: Dump server logs on failure
        if: failure()
        run: docker compose logs server || true

  build:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
