<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#89b4fa"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5c2e7"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f9e2af"/>
    </marker>
  </defs>
  <rect width="900" height="480" rx="12" fill="url(#abg)"/>

  <!-- Title -->
  <text x="450" y="25" fill="#cdd6f4" text-anchor="middle" font-size="15" font-weight="700">Remora Architecture</text>

  <!-- ── Clients (left) ────────────────────────────────────── -->
  <rect x="25" y="60" width="130" height="55" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="90" y="84" fill="#89b4fa" text-anchor="middle" font-weight="600">Neovim</text>
  <text x="90" y="100" fill="#6c7086" text-anchor="middle" font-size="10">(alice)</text>

  <rect x="25" y="135" width="130" height="55" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="90" y="159" fill="#89b4fa" text-anchor="middle" font-weight="600">Neovim</text>
  <text x="90" y="175" fill="#6c7086" text-anchor="middle" font-size="10">(bob)</text>

  <rect x="25" y="210" width="130" height="55" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="90" y="234" fill="#89b4fa" text-anchor="middle" font-weight="600">Neovim</text>
  <text x="90" y="250" fill="#6c7086" text-anchor="middle" font-size="10">(charlie)</text>

  <!-- Bridge boxes -->
  <rect x="175" y="72" width="65" height="30" rx="5" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="207" y="92" fill="#cdd6f4" text-anchor="middle" font-size="9">bridge</text>
  <rect x="175" y="147" width="65" height="30" rx="5" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="207" y="167" fill="#cdd6f4" text-anchor="middle" font-size="9">bridge</text>
  <rect x="175" y="222" width="65" height="30" rx="5" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="207" y="242" fill="#cdd6f4" text-anchor="middle" font-size="9">bridge</text>

  <!-- Client to bridge arrows -->
  <line x1="155" y1="87" x2="175" y2="87" stroke="#89b4fa" stroke-width="1"/>
  <line x1="155" y1="162" x2="175" y2="162" stroke="#89b4fa" stroke-width="1"/>
  <line x1="155" y1="237" x2="175" y2="237" stroke="#89b4fa" stroke-width="1"/>

  <!-- WS arrows to server -->
  <line x1="240" y1="87" x2="330" y2="150" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="240" y1="162" x2="330" y2="162" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="240" y1="237" x2="330" y2="175" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="280" y="128" fill="#585b70" font-size="9" transform="rotate(-20,280,128)">WebSocket</text>

  <!-- ── Server (center) ───────────────────────────────────── -->
  <rect x="333" y="95" width="175" height="140" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="420" y="120" fill="#f9e2af" text-anchor="middle" font-weight="700" font-size="14">Remora Server</text>
  <text x="420" y="138" fill="#6c7086" text-anchor="middle" font-size="11">Rust / axum / tokio</text>
  <line x1="348" y1="148" x2="493" y2="148" stroke="#45475a" stroke-width="1"/>
  <text x="420" y="166" fill="#cdd6f4" text-anchor="middle" font-size="11">REST + WebSocket</text>
  <text x="420" y="183" fill="#cdd6f4" text-anchor="middle" font-size="11">Event fan-out</text>
  <text x="420" y="200" fill="#cdd6f4" text-anchor="middle" font-size="11">Auth + Quotas</text>
  <text x="420" y="217" fill="#cdd6f4" text-anchor="middle" font-size="11">Session management</text>

  <!-- ── Database (below server) ───────────────────────────── -->
  <line x1="420" y1="235" x2="420" y2="285" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="333" y="288" width="175" height="80" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="420" y="313" fill="#a6e3a1" text-anchor="middle" font-weight="700">Database</text>
  <text x="420" y="332" fill="#6c7086" text-anchor="middle" font-size="10">Postgres | SQLite | MSSQL</text>
  <line x1="348" y1="340" x2="493" y2="340" stroke="#45475a" stroke-width="1"/>
  <text x="420" y="357" fill="#cdd6f4" text-anchor="middle" font-size="10">Events / Sessions / Quotas</text>

  <!-- Notification label -->
  <text x="475" y="270" fill="#a6e3a1" font-size="9">LISTEN/NOTIFY</text>
  <text x="475" y="281" fill="#a6e3a1" font-size="9">(or broadcast)</text>

  <!-- ── Claude (right of server) ──────────────────────────── -->
  <line x1="508" y1="165" x2="585" y2="165" stroke="#f5c2e7" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="546" y="157" fill="#585b70" font-size="9">stdio</text>

  <!-- Docker sandbox (dashed border around Claude + workspace) -->
  <rect x="578" y="48" width="300" height="235" rx="12" fill="none" stroke="#fab387" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="728" y="43" fill="#fab387" text-anchor="middle" font-size="10">Docker sandbox (optional)</text>

  <!-- Claude CLI -->
  <rect x="590" y="120" width="155" height="90" rx="10" fill="#313244" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="667" y="148" fill="#f5c2e7" text-anchor="middle" font-weight="700">Claude CLI</text>
  <text x="667" y="168" fill="#6c7086" text-anchor="middle" font-size="10">stream-json output</text>
  <text x="667" y="185" fill="#6c7086" text-anchor="middle" font-size="10">tool calls + responses</text>

  <!-- Workspace -->
  <rect x="590" y="60" width="155" height="48" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="667" y="82" fill="#f9e2af" text-anchor="middle" font-weight="600">Workspace</text>
  <text x="667" y="98" fill="#6c7086" text-anchor="middle" font-size="10">repo-a/ repo-b/ ...</text>

  <!-- Claude to workspace arrow -->
  <line x1="667" y1="120" x2="667" y2="108" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr4)"/>

  <!-- Allowlist / Fetch -->
  <rect x="760" y="120" width="105" height="65" rx="8" fill="#313244" stroke="#89dceb" stroke-width="1"/>
  <text x="812" y="142" fill="#89dceb" text-anchor="middle" font-weight="600" font-size="11">Fetch</text>
  <text x="812" y="158" fill="#6c7086" text-anchor="middle" font-size="9">URL fetching</text>
  <text x="812" y="172" fill="#6c7086" text-anchor="middle" font-size="9">Domain allowlist</text>

  <!-- Server to fetch arrow -->
  <line x1="508" y1="195" x2="760" y2="155" stroke="#89dceb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Event Log (bottom) ────────────────────────────────── -->
  <rect x="25" y="390" width="850" height="70" rx="10" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="60" y="415" fill="#585b70" font-size="11" font-weight="600">Event Log (append-only)</text>
  <!-- Sample events -->
  <text x="40" y="438" fill="#6c7086" font-size="10" font-family="JetBrains Mono, monospace">[14:22:05] * alice joined</text>
  <text x="230" y="438" fill="#89b4fa" font-size="10" font-family="JetBrains Mono, monospace">[14:22:08] alice: fix the auth bug</text>
  <text x="490" y="438" fill="#e5c07b" font-size="10" font-family="JetBrains Mono, monospace">[14:22:12] Claude called Edit(...)</text>
  <text x="740" y="438" fill="#a6e3a1" font-size="10" font-family="JetBrains Mono, monospace">[14:22:15] Claude: Fixed.</text>

  <!-- Server to event log -->
  <line x1="420" y1="368" x2="420" y2="390" stroke="#585b70" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="25" y="300" width="290" height="75" rx="8" fill="#1e1e2e" stroke="#45475a" stroke-width="1"/>
  <text x="40" y="318" fill="#585b70" font-size="10" font-weight="600">Legend</text>
  <line x1="40" y1="332" x2="70" y2="332" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="78" y="336" fill="#6c7086" font-size="10">WebSocket (bidirectional)</text>
  <line x1="40" y1="348" x2="70" y2="348" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="78" y="352" fill="#6c7086" font-size="10">Database queries + notifications</text>
  <line x1="40" y1="364" x2="70" y2="364" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="78" y="368" fill="#6c7086" font-size="10">Claude CLI (stdin/stdout streaming)</text>
</svg>
