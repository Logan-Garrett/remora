<svg xmlns="http://www.w3.org/2000/svg" width="960" height="580" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#89b4fa"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5c2e7"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f9e2af"/>
    </marker>
  </defs>
  <rect width="960" height="580" rx="12" fill="url(#abg)"/>

  <!-- Title -->
  <text x="480" y="30" fill="#cdd6f4" text-anchor="middle" font-size="16" font-weight="700">Remora Architecture</text>

  <!-- ── Clients (left column) ─────────────────────────────── -->

  <rect x="30" y="70" width="140" height="60" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="100" y="96" fill="#89b4fa" text-anchor="middle" font-weight="600" font-size="14">Neovim</text>
  <text x="100" y="114" fill="#6c7086" text-anchor="middle" font-size="11">(alice)</text>

  <rect x="30" y="150" width="140" height="60" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="100" y="176" fill="#89b4fa" text-anchor="middle" font-weight="600" font-size="14">Neovim</text>
  <text x="100" y="194" fill="#6c7086" text-anchor="middle" font-size="11">(bob)</text>

  <rect x="30" y="230" width="140" height="60" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="100" y="256" fill="#89b4fa" text-anchor="middle" font-weight="600" font-size="14">Neovim</text>
  <text x="100" y="274" fill="#6c7086" text-anchor="middle" font-size="11">(charlie)</text>

  <!-- Bridge boxes -->
  <rect x="195" y="82" width="70" height="36" rx="6" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="230" y="105" fill="#cdd6f4" text-anchor="middle" font-size="10">bridge</text>

  <rect x="195" y="162" width="70" height="36" rx="6" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="230" y="185" fill="#cdd6f4" text-anchor="middle" font-size="10">bridge</text>

  <rect x="195" y="242" width="70" height="36" rx="6" fill="#45475a" stroke="#585b70" stroke-width="1"/>
  <text x="230" y="265" fill="#cdd6f4" text-anchor="middle" font-size="10">bridge</text>

  <!-- Client → bridge arrows -->
  <line x1="170" y1="100" x2="195" y2="100" stroke="#89b4fa" stroke-width="1.5"/>
  <line x1="170" y1="180" x2="195" y2="180" stroke="#89b4fa" stroke-width="1.5"/>
  <line x1="170" y1="260" x2="195" y2="260" stroke="#89b4fa" stroke-width="1.5"/>

  <!-- Bridge → server WebSocket arrows -->
  <line x1="265" y1="100" x2="365" y2="165" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <line x1="265" y1="180" x2="365" y2="180" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <line x1="265" y1="260" x2="365" y2="195" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="310" y="140" fill="#585b70" font-size="10" transform="rotate(-18,310,140)">WebSocket</text>

  <!-- ── Server (center) ───────────────────────────────────── -->

  <rect x="368" y="100" width="190" height="160" rx="12" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
  <text x="463" y="130" fill="#f9e2af" text-anchor="middle" font-weight="700" font-size="15">Remora Server</text>
  <text x="463" y="150" fill="#6c7086" text-anchor="middle" font-size="12">Rust / axum / tokio</text>
  <line x1="385" y1="162" x2="541" y2="162" stroke="#45475a" stroke-width="1"/>
  <text x="463" y="182" fill="#cdd6f4" text-anchor="middle" font-size="12">REST + WebSocket</text>
  <text x="463" y="200" fill="#cdd6f4" text-anchor="middle" font-size="12">Event fan-out</text>
  <text x="463" y="218" fill="#cdd6f4" text-anchor="middle" font-size="12">Auth + Quotas</text>
  <text x="463" y="236" fill="#cdd6f4" text-anchor="middle" font-size="12">Session management</text>

  <!-- ── Database (below server) ───────────────────────────── -->

  <line x1="463" y1="260" x2="463" y2="320" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="500" y="295" fill="#a6e3a1" font-size="10">queries +</text>
  <text x="500" y="307" fill="#a6e3a1" font-size="10">notifications</text>

  <rect x="368" y="323" width="190" height="90" rx="12" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <text x="463" y="352" fill="#a6e3a1" text-anchor="middle" font-weight="700" font-size="14">Database</text>
  <text x="463" y="372" fill="#6c7086" text-anchor="middle" font-size="11">Postgres | SQLite | MSSQL</text>
  <line x1="385" y1="382" x2="541" y2="382" stroke="#45475a" stroke-width="1"/>
  <text x="463" y="400" fill="#cdd6f4" text-anchor="middle" font-size="11">Events / Sessions / Quotas</text>

  <!-- ── Right side: Claude + Sandbox + Workspace ──────────── -->

  <!-- Docker sandbox border -->
  <rect x="600" y="55" width="335" height="270" rx="14" fill="none" stroke="#fab387" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="767" y="48" fill="#fab387" text-anchor="middle" font-size="11" font-weight="600">Docker Sandbox (optional)</text>

  <!-- Workspace -->
  <rect x="620" y="75" width="170" height="55" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="705" y="100" fill="#f9e2af" text-anchor="middle" font-weight="600" font-size="13">Workspace</text>
  <text x="705" y="118" fill="#6c7086" text-anchor="middle" font-size="11">repo-a/ repo-b/ ...</text>

  <!-- Server → workspace arrow -->
  <line x1="558" y1="135" x2="620" y2="100" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>
  <text x="582" y="110" fill="#585b70" font-size="9">git ops</text>

  <!-- Claude CLI -->
  <rect x="620" y="150" width="170" height="80" rx="10" fill="#313244" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="705" y="178" fill="#f5c2e7" text-anchor="middle" font-weight="700" font-size="14">Claude CLI</text>
  <text x="705" y="198" fill="#6c7086" text-anchor="middle" font-size="11">stream-json output</text>
  <text x="705" y="215" fill="#6c7086" text-anchor="middle" font-size="11">tool calls + responses</text>

  <!-- Server → Claude arrow -->
  <line x1="558" y1="180" x2="620" y2="180" stroke="#f5c2e7" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="588" y="172" fill="#585b70" font-size="9">stdio</text>

  <!-- Claude → workspace arrow -->
  <line x1="705" y1="150" x2="705" y2="130" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr4)"/>

  <!-- Fetch / Allowlist -->
  <rect x="810" y="150" width="110" height="80" rx="10" fill="#313244" stroke="#89dceb" stroke-width="1.5"/>
  <text x="865" y="178" fill="#89dceb" text-anchor="middle" font-weight="600" font-size="13">Fetch</text>
  <text x="865" y="198" fill="#6c7086" text-anchor="middle" font-size="10">URL fetching</text>
  <text x="865" y="215" fill="#6c7086" text-anchor="middle" font-size="10">Domain allowlist</text>

  <!-- Server → fetch arrow -->
  <line x1="558" y1="210" x2="810" y2="185" stroke="#89dceb" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="680" y="205" fill="#585b70" font-size="9">allowlist check</text>

  <!-- ── Event Log (bottom) ────────────────────────────────── -->

  <rect x="30" y="450" width="900" height="80" rx="12" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="70" y="478" fill="#585b70" font-size="12" font-weight="600">Append-only Event Log</text>
  <text x="70" y="494" fill="#45475a" font-size="10">Persisted forever in the database. Every action is an event.</text>

  <!-- Sample events -->
  <text x="50" y="518" fill="#6c7086" font-size="10" font-family="JetBrains Mono, monospace">[14:22:05] * alice joined</text>
  <text x="260" y="518" fill="#89b4fa" font-size="10" font-family="JetBrains Mono, monospace">[14:22:08] alice: fix auth</text>
  <text x="470" y="518" fill="#e5c07b" font-size="10" font-family="JetBrains Mono, monospace">[14:22:12] Claude called Edit</text>
  <text x="720" y="518" fill="#98c379" font-size="10" font-family="JetBrains Mono, monospace">[14:22:15] Claude: Fixed.</text>

  <!-- Server → event log arrow -->
  <line x1="463" y1="413" x2="463" y2="450" stroke="#585b70" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── Legend (bottom-left) ──────────────────────────────── -->

  <rect x="620" y="340" width="310" height="85" rx="10" fill="#1e1e2e" stroke="#45475a" stroke-width="1"/>
  <text x="640" y="360" fill="#585b70" font-size="11" font-weight="600">Legend</text>
  <line x1="640" y1="376" x2="680" y2="376" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="690" y="380" fill="#6c7086" font-size="10">WebSocket (bidirectional)</text>
  <line x1="640" y1="396" x2="680" y2="396" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="690" y="400" fill="#6c7086" font-size="10">Database queries + notifications</text>
  <line x1="640" y1="416" x2="680" y2="416" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="690" y="420" fill="#6c7086" font-size="10">Claude CLI (stdin/stdout streaming)</text>
</svg>
