<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" font-family="JetBrains Mono, Menlo, monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>
  <!-- Terminal background -->
  <rect width="800" height="500" rx="10" fill="url(#bg)"/>
  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#313244"/>
  <rect y="20" width="800" height="12" fill="#313244"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="38" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="56" cy="16" r="6" fill="#a6e3a1"/>
  <text x="400" y="20" fill="#cdd6f4" text-anchor="middle" font-size="12">nvim</text>

  <!-- Telescope header -->
  <rect x="80" y="52" width="640" height="28" rx="6" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="100" y="70" fill="#89b4fa" font-size="12">Remora Sessions</text>
  <rect x="80" y="80" width="640" height="1" fill="#585b70"/>

  <!-- Search input -->
  <rect x="80" y="82" width="640" height="26" fill="#1e1e2e" stroke="#585b70" stroke-width="1"/>
  <text x="90" y="99" fill="#f5c2e7">></text>
  <text x="105" y="99" fill="#cdd6f4">_</text>

  <!-- Results -->
  <rect x="80" y="108" width="420" height="340" fill="#1e1e2e" stroke="#585b70" stroke-width="1"/>

  <!-- Selected row -->
  <rect x="81" y="110" width="418" height="22" fill="#45475a"/>
  <text x="92" y="126" fill="#89b4fa" font-size="11">c2034f16-a8c7-43d5-b364  </text>
  <text x="320" y="126" fill="#a6e3a1" font-size="11">full test</text>

  <text x="92" y="148" fill="#6c7086" font-size="11">a7bf9db3-8aac-4988-a9d3  </text>
  <text x="320" y="148" fill="#6c7086" font-size="11">api refactor</text>

  <text x="92" y="170" fill="#6c7086" font-size="11">f91b2c44-de07-4a91-bc82  </text>
  <text x="320" y="170" fill="#6c7086" font-size="11">frontend bugs</text>

  <text x="92" y="192" fill="#6c7086" font-size="11">19ea5d32-7f11-4b29-9e44  </text>
  <text x="320" y="192" fill="#6c7086" font-size="11">auth middleware</text>

  <!-- Preview pane -->
  <rect x="500" y="108" width="220" height="340" fill="#1e1e2e" stroke="#585b70" stroke-width="1"/>
  <text x="510" y="130" fill="#585b70" font-size="11">Session Details</text>
  <rect x="500" y="136" width="220" height="1" fill="#585b70"/>

  <text x="510" y="158" fill="#cdd6f4" font-size="11">Session: c2034f16...</text>
  <text x="510" y="178" fill="#cdd6f4" font-size="11">Description: full test</text>
  <text x="510" y="198" fill="#cdd6f4" font-size="11">Created: 2026-04-29</text>
  <text x="510" y="228" fill="#a6e3a1" font-size="11">Press &lt;CR&gt; to join</text>

  <!-- Footer -->
  <text x="100" y="468" fill="#585b70" font-size="11">4 sessions | &lt;space&gt;ms to open</text>
</svg>
