<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <linearGradient id="efbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#89b4fa"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1"/>
    </marker>
    <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5c2e7"/>
    </marker>
  </defs>
  <rect width="960" height="620" rx="12" fill="url(#efbg)"/>
  <text x="480" y="30" fill="#cdd6f4" text-anchor="middle" font-size="16" font-weight="700">How a /run flows through the system</text>

  <!-- Swim lane headers -->
  <rect x="40" y="48" width="120" height="26" rx="6" fill="#313244"/>
  <text x="100" y="66" fill="#89b4fa" text-anchor="middle" font-weight="700" font-size="13">Alice</text>
  <rect x="220" y="48" width="120" height="26" rx="6" fill="#313244"/>
  <text x="280" y="66" fill="#89b4fa" text-anchor="middle" font-weight="700" font-size="13">Bob</text>
  <rect x="410" y="48" width="140" height="26" rx="6" fill="#313244"/>
  <text x="480" y="66" fill="#f9e2af" text-anchor="middle" font-weight="700" font-size="13">Server</text>
  <rect x="600" y="48" width="120" height="26" rx="6" fill="#313244"/>
  <text x="660" y="66" fill="#a6e3a1" text-anchor="middle" font-weight="700" font-size="13">Database</text>
  <rect x="790" y="48" width="130" height="26" rx="6" fill="#313244"/>
  <text x="855" y="66" fill="#f5c2e7" text-anchor="middle" font-weight="700" font-size="13">Claude CLI</text>

  <!-- Vertical lane lines -->
  <line x1="100" y1="78" x2="100" y2="600" stroke="#313244" stroke-width="1.5"/>
  <line x1="280" y1="78" x2="280" y2="600" stroke="#313244" stroke-width="1.5"/>
  <line x1="480" y1="78" x2="480" y2="600" stroke="#313244" stroke-width="1.5"/>
  <line x1="660" y1="78" x2="660" y2="600" stroke="#313244" stroke-width="1.5"/>
  <line x1="855" y1="78" x2="855" y2="600" stroke="#313244" stroke-width="1.5"/>

  <!-- ── PHASE 1: Chat ──────────────────────────────────────── -->
  <text x="30" y="103" fill="#45475a" font-size="10" font-weight="600">CHAT</text>

  <!-- ① Alice sends chat -->
  <rect x="40" y="110" width="120" height="30" rx="6" fill="#45475a"/>
  <text x="100" y="130" fill="#cdd6f4" text-anchor="middle" font-size="11">"fix the auth bug"</text>
  <line x1="160" y1="125" x2="460" y2="125" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="310" y="118" fill="#585b70" font-size="10">WebSocket message</text>

  <!-- ② Server inserts event -->
  <line x1="495" y1="125" x2="640" y2="145" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="565" y="132" fill="#585b70" font-size="10">INSERT event</text>

  <!-- ③ DB notifies server -->
  <line x1="650" y1="155" x2="495" y2="168" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a2)"/>
  <text x="575" y="166" fill="#a6e3a1" font-size="10">NOTIFY</text>

  <!-- ④ Server broadcasts to both clients -->
  <line x1="465" y1="178" x2="115" y2="190" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="465" y1="178" x2="295" y2="190" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="240" y="186" fill="#585b70" font-size="10">broadcast to all clients</text>

  <!-- Separator -->
  <line x1="30" y1="210" x2="930" y2="210" stroke="#45475a" stroke-width="0.5" stroke-dasharray="3,5"/>

  <!-- ── PHASE 2: Run ───────────────────────────────────────── -->
  <text x="30" y="233" fill="#45475a" font-size="10" font-weight="600">RUN</text>

  <!-- ⑤ Alice sends /run -->
  <rect x="50" y="240" width="100" height="30" rx="6" fill="#45475a"/>
  <text x="100" y="260" fill="#a6e3a1" text-anchor="middle" font-size="12" font-weight="600">/run</text>
  <line x1="160" y1="255" x2="460" y2="255" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="310" y="248" fill="#585b70" font-size="10">run command</text>

  <!-- ⑥ Server assembles context -->
  <rect x="415" y="272" width="130" height="28" rx="6" fill="#45475a"/>
  <text x="480" y="291" fill="#f9e2af" text-anchor="middle" font-size="11">assemble context</text>

  <!-- ⑦ Server queries events from DB -->
  <line x1="495" y1="300" x2="640" y2="315" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="565" y="306" fill="#585b70" font-size="10">SELECT events</text>
  <line x1="650" y1="325" x2="495" y2="338" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a2)"/>
  <text x="575" y="337" fill="#585b70" font-size="10">event rows</text>

  <!-- ⑧ Server spawns Claude -->
  <line x1="495" y1="350" x2="835" y2="365" stroke="#f5c2e7" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="665" y="355" fill="#585b70" font-size="10">spawn claude -p "context..."</text>

  <!-- Separator -->
  <line x1="30" y1="385" x2="930" y2="385" stroke="#45475a" stroke-width="0.5" stroke-dasharray="3,5"/>

  <!-- ── PHASE 3: Stream ────────────────────────────────────── -->
  <text x="30" y="408" fill="#45475a" font-size="10" font-weight="600">STREAM</text>

  <!-- ⑨ Claude sends tool_call -->
  <rect x="798" y="415" width="115" height="28" rx="6" fill="#45475a"/>
  <text x="855" y="434" fill="#e5c07b" text-anchor="middle" font-size="11">tool_call: Edit</text>
  <line x1="835" y1="443" x2="495" y2="460" stroke="#f5c2e7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <text x="665" y="452" fill="#585b70" font-size="10">stdout → server</text>

  <!-- ⑩ Server persists + broadcasts tool_call -->
  <line x1="495" y1="465" x2="640" y2="468" stroke="#a6e3a1" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="465" y1="478" x2="115" y2="490" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="465" y1="478" x2="295" y2="490" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="240" y="487" fill="#e5c07b" font-size="10">tool_call event</text>

  <!-- Separator -->
  <line x1="30" y1="508" x2="930" y2="508" stroke="#45475a" stroke-width="0.5" stroke-dasharray="3,5"/>

  <!-- ⑪ Claude sends response -->
  <rect x="790" y="520" width="130" height="28" rx="6" fill="#45475a"/>
  <text x="855" y="539" fill="#98c379" text-anchor="middle" font-size="11">text: "Fixed it."</text>
  <line x1="835" y1="548" x2="495" y2="560" stroke="#f5c2e7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <text x="665" y="556" fill="#585b70" font-size="10">stdout → server</text>

  <!-- ⑫ Server persists + broadcasts response -->
  <line x1="495" y1="565" x2="640" y2="568" stroke="#a6e3a1" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="465" y1="575" x2="115" y2="585" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="465" y1="575" x2="295" y2="585" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="240" y="583" fill="#98c379" font-size="10">claude_response event</text>

  <!-- Both clients show the result -->
  <rect x="40" y="592" width="120" height="24" rx="6" fill="#313244" stroke="#98c379" stroke-width="1.5"/>
  <text x="100" y="608" fill="#98c379" text-anchor="middle" font-size="11">Claude: Fixed it.</text>
  <rect x="220" y="592" width="120" height="24" rx="6" fill="#313244" stroke="#98c379" stroke-width="1.5"/>
  <text x="280" y="608" fill="#98c379" text-anchor="middle" font-size="11">Claude: Fixed it.</text>

  <!-- Server shows completion -->
  <rect x="425" y="592" width="110" height="24" rx="6" fill="#313244" stroke="#f9e2af" stroke-width="1"/>
  <text x="480" y="608" fill="#f9e2af" text-anchor="middle" font-size="11">run complete</text>
</svg>
